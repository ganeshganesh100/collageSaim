
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Foody Web</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Foody web" />
    <link rel="manifest" href="/assets/site.webmanifest" />
</head>
<body>
    <header>
        <div class="container">
            <img src="/assets/logo.png" alt="Foody Web Logo" width="150">
            <div class="hamburger-menu">
                <i class="fas fa-bars"></i>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="cart.html">Products</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="login.html">Account</a></li>
                    <li><a href="addToChart.html"><i class="fas fa-shopping-cart"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h2>Account Information</h2>
                <div class="account-info">
                    <div class="account-card">
                        <img src="/assets/person.png" alt="User" class="user-icon">
                        <h3>Welcome to Foody Web</h3>
                        <p>Browse our delicious menu and place your orders!</p>
                        <a href="../index.html" class="btn">Explore Menu</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Notification for cart/auth messages -->
        <div id="cartNotification" class="cart-notification"></div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Foody Web. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/script.js"></script>
</body>
</html>
