<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Foody Web</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Foody web" />
    <link rel="manifest" href="/assets/site.webmanifest" />
</head>
<body>
    <header>
        <div class="container">
            <img src="/assets/logo.png" alt="Foody Web Logo" width="150">
            <div class="hamburger-menu">
                <i class="fas fa-bars"></i>
            </div>
            <nav class="main-nav">
                <ul>
        
                    <li><a href="cart.html">Products</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="login.html">Account</a></li>
                    <li><a href="addToChart.html"><i class="fas fa-shopping-cart"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="contact" class="section">
            <div class="container">
                <h2>Contact Us</h2>
                <div id="cartNotification" class="cart-notification"></div>

                <div class="contact-layout">
                    <div class="contact-info">
                 
                        <div class="contact-card">
                            <div class="contact-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <div>
                                    <strong>Address:</strong><br>
                                    123 Food Street, Kathmandu, Nepal
                                </div>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-phone"></i>
                                <div>
                                    <strong>Phone:</strong><br>
                                    +977-1-4444444
                                </div>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-envelope"></i>
                          
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-clock"></i>
                                <div>
                                    <strong>Hours:</strong><br>
                                    Mon-Sun: 10:00 AM - 11:00 PM
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form-section">

                        <form id="contactForm">
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" required>

                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>

                            <label for="phone">Phone:</label>
                            <input type="tel" id="phone" name="phone">

                            <label for="subject">Subject:</label>
                            <input type="text" id="subject" name="subject" required>

                            <label for="message">Message:</label>
                            <textarea id="message" name="message" required></textarea>

                            <button type="submit" class="btn">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">

        </div>
    </footer>

    <script src="/js/script.js"></script>
</body>
</html>
